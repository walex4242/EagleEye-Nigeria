<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EagleEye — Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d1117;
        color: #e6edf3;
        font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .eagle {
        font-size: 80px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 12px;
      }
      p {
        color: #8b949e;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .retry-btn {
        background: #f85149;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .retry-btn:active {
        transform: scale(0.95);
      }
      .status {
        margin-top: 24px;
        font-size: 12px;
        color: #484f58;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="eagle">🦅</div>
      <h1>Connection Lost</h1>
      <p>
        EagleEye cannot reach the server. Cached data may still be available
        when connectivity is restored.
      </p>
      <button class="retry-btn" onclick="location.reload()">
        🔄 Retry Connection
      </button>
      <div class="status">
        Last online: <span id="last-online">Unknown</span>
      </div>
    </div>
    <script>
      const lastOnline = localStorage.getItem('eagleeye_last_online');
      if (lastOnline) {
        document.getElementById('last-online').textContent = new Date(
          lastOnline,
        ).toLocaleString();
      }
    </script>
  </body>
</html>
