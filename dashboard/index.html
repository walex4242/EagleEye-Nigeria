<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EagleEye-Nigeria — Satellite Intelligence Dashboard</title>
  <meta name="description" content="Real-time satellite threat intelligence for Nigeria — NASA FIRMS, Sentinel-2, ACLED" />

  <!-- ═══════════════════════════════════
       Theme Color — Cross-Browser Support
       ═══════════════════════════════════
       • meta[name="theme-color"] — Chrome, Samsung Internet, Edge (Chromium)
       • meta[name="msapplication-navbutton-color"] — Legacy Edge / IE
       • meta[name="apple-mobile-web-app-status-bar-style"] — Safari iOS
       • Firefox / Opera do NOT support theme-color meta;
         fallback is handled via CSS color-scheme + scrollbar-color
         in base.css instead.
       ═══════════════════════════════════ -->
  <meta name="theme-color" content="#0a0e14" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0a0e14" media="(prefers-color-scheme: light)" />
  <meta name="msapplication-navbutton-color" content="#0a0e14" />
  <meta name="msapplication-TileColor" content="#0a0e14" />
  <meta name="color-scheme" content="dark" />

  <!-- ═══════════════════════════════════
       Favicon — Browser Tab Icon
       ═══════════════════════════════════ -->
  <!-- Standard favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16.png" />
  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />

  <!-- ═══════════════════════════════════
       PWA Manifest & Apple Meta
       ═══════════════════════════════════ -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EagleEye" />
  <meta name="application-name" content="EagleEye" />

  <!-- ═══════════════════════════════════
       Firefox / Opera Theme Fallback
       Inline critical styles that enforce
       the dark chrome feel where meta tags
       are unsupported.
       ═══════════════════════════════════ -->
  <style>
    :root {
      color-scheme: dark;               /* Baseline 2024 — all major browsers */
      scrollbar-color: #1e293b #0a0e14; /* Firefox 64+ scrollbar theming     */
      accent-color: #3b82f6;            /* Baseline 2022 — form accent color */
    }

    /* Prevent FOUC — hide until app mounts */
    #app { visibility: visible; }
  </style>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- App CSS (modular) -->
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/navbar.css" />
  <link rel="stylesheet" href="/static/css/statsbar.css" />
  <link rel="stylesheet" href="/static/css/sidebar.css" />
  <link rel="stylesheet" href="/static/css/modals.css" />
</head>
<body>

  <!-- ═══════════════════════════════════
       App Shell
       ═══════════════════════════════════ -->
  <div id="app">

    <!-- Loading Overlay -->
    <div id="loading-overlay" role="status" aria-live="polite">
      <div class="loading-eagle" aria-hidden="true">🦅</div>
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-text" id="loading-text">Initializing EagleEye-Nigeria...</p>
      <div class="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" title="loading">
        <div class="loading-bar-fill"></div>
      </div>
    </div>

    <!-- Alert Banner -->
    <div id="alert-banner" role="alert" aria-live="assertive">
      <span aria-hidden="true">⚠️</span>
      <span id="alert-banner-text"></span>
      <button
        class="alert-close"
        type="button"
        onclick="document.getElementById('alert-banner').classList.remove('visible')"
        aria-label="Dismiss alert"
      >✕</button>
    </div>

    <!-- Navbar (rendered by navbar.js) -->
    <nav id="navbar" role="navigation" aria-label="Main navigation"></nav>

    <!-- Stats Bar (rendered by statsBar.js) -->
    <div id="stats-bar" role="toolbar" aria-label="Statistics and controls"></div>

    <!-- Main Content -->
    <main id="main-content">

      <!-- Map -->
      <div id="map" role="application" aria-label="Nigeria threat map" tabindex="0"></div>

      <!-- Source note -->
      <div id="source-note" aria-hidden="true">
        Source: NASA FIRMS · VIIRS SNPP NRT
      </div>

      <!-- Intelligence Sidebar (rendered by sidebar.js) -->
      <aside id="sidebar" class="collapsed" role="complementary" aria-label="Intelligence panel"></aside>

    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ═══════════════════════════════════
       Scripts — Load order matters:
       1. Utils (no deps)
       2. Components (depend on utils)
       3. App bootstrap (wires everything)
       ═══════════════════════════════════ -->

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Utils -->
  <script src="/static/js/utils/state.js"></script>
  <script src="/static/js/utils/helpers.js"></script>
  <script src="/static/js/utils/auth.js"></script>
  <script src="/static/js/utils/api.js"></script>

  <!-- Components -->
  <script src="/static/js/components/authModal.js"></script>
  <script src="/static/js/components/navbar.js"></script>
  <script src="/static/js/components/statsBar.js"></script>
  <script src="/static/js/components/mapView.js"></script>
  <script src="/static/js/components/sidebar.js"></script>

  <!-- Bootstrap -->
  <script src="/static/js/app.js"></script>

</body>
</html>
